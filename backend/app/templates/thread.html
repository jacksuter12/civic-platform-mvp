<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread — Civic Platform</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/nav.js"></script>
  <style>
    /* ================================================================
       Thread-specific styles — supplements main.css
       ================================================================ */

    /* --- Signal bar (polymorphic system) --- */
    .signal-bar-wrap { margin: 8px 0; }

    .sig-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }

    .sig-btn {
      padding: 4px 10px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-left-width: 3px;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, border-color 0.15s;
    }
    .sig-btn:hover:not(:disabled) { background: #f5f5f5; }
    .sig-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .sig-btn-support   { border-left-color: #4caf50; }
    .sig-btn-concern   { border-left-color: #ff9800; }
    .sig-btn-need_info { border-left-color: #2196f3; }
    .sig-btn-block     { border-left-color: #e53935; }
    .sig-active.sig-btn-support   { background: #e8f5e9; border-color: #4caf50; font-weight: 600; }
    .sig-active.sig-btn-concern   { background: #fff3e0; border-color: #ff9800; font-weight: 600; }
    .sig-active.sig-btn-need_info { background: #e3f2fd; border-color: #2196f3; font-weight: 600; }
    .sig-active.sig-btn-block     { background: #ffebee; border-color: #e53935; font-weight: 600; }
    .sig-count { font-size: 12px; opacity: 0.75; }

    .sig-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .sig-chip {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 12px;
      background: #f0f0f0;
      color: #555;
    }
    .sig-chip-support   { background: #e8f5e9; color: #2e7d32; }
    .sig-chip-concern   { background: #fff3e0; color: #e65100; }
    .sig-chip-need_info { background: #e3f2fd; color: #1565c0; }
    .sig-chip-block     { background: #ffebee; color: #c62828; }
    .sig-none { font-size: 12px; color: #bbb; font-style: italic; }

    .sig-block-warn {
      display: inline-block;
      font-size: 12px;
      color: #c62828;
      font-weight: 600;
      margin-left: 8px;
    }
    .sig-note { font-size: 12px; color: #888; margin-top: 4px; }

    /* --- Post tree --- */
    .post-root { margin-bottom: 20px; }
    .post-root-actions { margin-bottom: 4px; }

    .post-root-summary {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 12px;
      background: #f9f9f9;
      border-radius: 4px;
      font-size: 13px;
      cursor: default;
    }
    .post-root-summary .post-author { font-weight: 600; }
    .post-preview {
      flex: 1;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 400px;
    }
    .post-meta { color: #888; font-size: 12px; white-space: nowrap; }

    .post-item { box-sizing: border-box; }

    .post-actions { display: flex; gap: 8px; margin-top: 6px; align-items: center; }

    .post-reply-btn {
      background: none;
      border: none;
      color: #1565c0;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      text-decoration: underline;
    }
    .post-reply-btn:hover { color: #0d47a1; }

    .post-children { margin-top: 8px; }

    .children-toggle {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 0;
      margin-top: 4px;
      display: block;
    }
    .children-toggle:hover { color: #333; }

    .collapse-link {
      background: none;
      border: none;
      color: #1565c0;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      text-decoration: underline;
      white-space: nowrap;
    }
    .collapse-link:hover { color: #0d47a1; }

    .max-depth-msg { font-size: 11px; color: #aaa; font-style: italic; }

    .reply-slot { margin-top: 8px; }

    .inline-reply-form { margin-top: 8px; }
    .inline-reply-form textarea,
    .comment-add-form textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      resize: vertical;
      display: block;
      margin-bottom: 0;
    }
    .inline-reply-form textarea:focus,
    .comment-add-form textarea:focus { border-color: #1565c0; outline: none; }

    /* --- Forms --- */
    #new-post-form textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-size: 14px;
      resize: vertical;
      display: block;
    }
    #new-post-form textarea:focus { border-color: #1565c0; outline: none; }

    .form-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .form-error { color: #c62828; font-size: 13px; flex: 1; }

    .back-link {
      display: inline-block;
      font-size: 13px;
      color: #1565c0;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .back-link:hover { text-decoration: underline; }

    .phase-locked {
      background: #f5f5f5;
      border-radius: 4px;
      padding: 10px 14px;
      color: #888;
      font-size: 14px;
      margin-top: 8px;
    }

    /* --- Buttons --- */
    .btn-secondary {
      padding: 8px 16px;
      background: #fff;
      color: #333;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #f0f0f0; }

    .btn-sm { padding: 4px 10px !important; font-size: 13px !important; }

    .btn-accept {
      padding: 6px 14px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-accept:hover:not(:disabled) { background: #1b5e20; }
    .btn-accept:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-reject {
      padding: 6px 14px;
      background: #c62828;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-reject:hover:not(:disabled) { background: #b71c1c; }
    .btn-reject:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- Version history --- */
    .version-label { font-size: 12px; color: #888; margin: 6px 0 2px; }
    .version-details { margin: 4px 0 8px; }
    .version-details > summary {
      font-size: 13px;
      color: #1565c0;
      cursor: pointer;
      user-select: none;
    }
    .version-list { margin-top: 8px; }
    .version-list-loading { font-size: 13px; color: #aaa; padding: 6px 0; }
    .version-entry {
      display: flex;
      gap: 10px;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .version-entry:last-child { border-bottom: none; }
    .version-num { font-weight: 600; color: #333; min-width: 24px; }
    .version-time { color: #888; font-size: 12px; min-width: 80px; }
    .version-summary { color: #555; }

    /* --- Proposal subsections --- */
    .proposal-edit-slot { margin-top: 8px; }
    .proposal-edit-form {
      margin-top: 8px;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
    }
    .proposal-edit-form .form-field { margin-bottom: 12px; }
    .proposal-edit-form label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .proposal-edit-form input[type="text"],
    .proposal-edit-form textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      resize: vertical;
    }
    .proposal-edit-form input[type="text"]:focus,
    .proposal-edit-form textarea:focus { border-color: #1565c0; outline: none; }

    .proposal-comments-section { margin-top: 16px; border-top: 1px solid #f0f0f0; padding-top: 12px; }
    .proposal-amendments-section { margin-top: 16px; border-top: 1px solid #f0f0f0; padding-top: 12px; }

    .subsection-heading {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .comment-add-form { margin-bottom: 12px; }

    .comments-tree { margin-top: 4px; }

    /* --- Amendments --- */
    .amendments-list { margin-top: 8px; }

    .amendment-card {
      border: 1px solid #e0e0e0;
      border-left-width: 4px;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 12px;
      background: #fff;
    }
    .amendment-pending  { border-left-color: #ff9800; }
    .amendment-accepted { border-left-color: #4caf50; }
    .amendment-rejected { border-left-color: #e53935; opacity: 0.75; }

    .amendment-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .amendment-title { font-weight: 600; font-size: 14px; }
    .amendment-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .badge-pending  { background: #fff3e0; color: #e65100; }
    .badge-accepted { background: #e8f5e9; color: #2e7d32; }
    .badge-rejected { background: #ffebee; color: #c62828; }
    .amendment-meta { font-size: 12px; color: #888; margin-left: auto; white-space: nowrap; }

    .amendment-body { font-size: 13px; margin-bottom: 8px; }
    .amendment-original,
    .amendment-proposed,
    .amendment-rationale { margin: 5px 0; }
    .amendment-label { font-weight: 600; color: #555; margin-right: 4px; }
    .amendment-text-original { color: #b71c1c; font-family: monospace; font-size: 12px; }
    .amendment-text-proposed { color: #1b5e20; font-family: monospace; font-size: 12px; }

    .amendment-accepted-note {
      font-size: 12px;
      color: #2e7d32;
      background: #e8f5e9;
      padding: 6px 10px;
      border-radius: 4px;
      margin: 8px 0;
    }
    .amendment-review-btns { display: flex; gap: 8px; margin-top: 10px; }

    .amendment-form-slot { margin-top: 8px; }
    .amendment-form {
      margin-top: 8px;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
    }
    .amendment-form .form-field { margin-bottom: 12px; }
    .amendment-form label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .amendment-form input[type="text"],
    .amendment-form textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      resize: vertical;
    }
    .amendment-form input[type="text"]:focus,
    .amendment-form textarea:focus { border-color: #1565c0; outline: none; }

    /* --- Vote tally --- */
    .vote-tally {
      display: flex;
      gap: 16px;
      font-size: 13px;
      margin: 8px 0;
      padding: 8px 12px;
      background: #f9f9f9;
      border-radius: 4px;
      flex-wrap: wrap;
    }
    .vote-tally .vote-yes     { color: #2e7d32; }
    .vote-tally .vote-no      { color: #c62828; }
    .vote-tally .vote-abstain { color: #888; }
    .vote-tally .vote-total   { color: #555; margin-left: auto; }

    /* --- Facilitator panel (new layout classes) --- */
    .facilitator-badge-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .facilitator-desc { color: #666; font-size: 14px; margin-bottom: 12px; }

    #advance-btn {
      /* mirrors .btn-advance from main.css */
    }
    #advance-error { color: #c62828; font-size: 13px; flex: 1; }

    /* --- Compact proposal card grid --- */
    .proposals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .proposal-compact-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .proposal-compact-card:hover { border-color: #aaa; }

    .pcc-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      justify-content: space-between;
    }

    .pcc-title {
      font-size: 15px;
      font-weight: 500;
      color: #1565c0;
      text-decoration: none;
      flex: 1;
      min-width: 0;
    }
    .pcc-title:hover { text-decoration: underline; }

    .pcc-meta {
      font-size: 12px;
      color: #888;
    }

    .pcc-signals { display: flex; flex-wrap: wrap; gap: 4px; }
    .pcc-counts { font-size: 12px; color: #888; display: flex; gap: 12px; }

    .pcc-open-link {
      font-size: 13px;
      font-weight: 500;
      color: #2a5c9a;
      text-decoration: none;
      align-self: flex-end;
      margin-top: auto;
    }
    .pcc-open-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="container" id="thread-container">
    <div class="loading">Loading thread…</div>
  </main>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/thread.js"></script>

</body>
</html>
