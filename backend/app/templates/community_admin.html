<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Admin — Civic Platform</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/nav.js"></script>
  <style>
    .request-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 18px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .request-row:last-child { border-bottom: none; }
    .request-name  { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .request-tier  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-top: 4px; }
    .request-reason {
      font-size: 14px; color: #333; margin-top: 10px; line-height: 1.5;
      padding-left: 12px; border-left: 3px solid #e0e0e0;
    }
    .request-date  { font-size: 12px; color: #aaa; margin-top: 6px; }
    .request-actions { display: flex; gap: 8px; flex-shrink: 0; padding-top: 2px; }
    .btn-approve {
      padding: 7px 16px; background: #2e7d32; color: #fff;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-approve:hover:not(:disabled) { background: #1b5e20; }
    .btn-deny {
      padding: 7px 16px; background: #fff; color: #c62828;
      border: 1px solid #e57373; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-deny:hover:not(:disabled) { background: #fff3f3; }
    .btn-approve:disabled, .btn-deny:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-tag {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .status-approved { background: #e8f5e9; color: #2e7d32; }
    .status-denied   { background: #fff3f3; color: #c62828; }

    .member-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px;
    }
    .member-row:last-child { border-bottom: none; }
    .member-name { font-weight: 600; color: #1a1a1a; }
    .tier-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 12px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .tier-admin       { background: #ede7f6; color: #4527a0; }
    .tier-facilitator { background: #e3f2fd; color: #1565c0; }
    .tier-participant { background: #e8f5e9; color: #2e7d32; }
    .tier-registered  { background: #f5f5f5; color: #555; }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="container" style="padding-top: 32px; padding-bottom: 64px;">
    <div id="page-content">
      <div class="loading">Loading…</div>
    </div>
  </main>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>

    function parseCommunitySlug() {
      const m = window.location.pathname.match(/^\/c\/([^/]+)/);
      return m ? m[1] : null;
    }

    const communitySlug = parseCommunitySlug();

    function esc(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function tierClass(tier) {
      return { admin: "tier-admin", facilitator: "tier-facilitator", participant: "tier-participant", registered: "tier-registered" }[tier] || "tier-registered";
    }

    async function init() {
      if (!auth.isSignedIn()) {
        window.location.href = "/signin";
        return;
      }

      if (!communitySlug) {
        document.getElementById("page-content").innerHTML = `<div class="error-message">Invalid community URL.</div>`;
        return;
      }

      const content = document.getElementById("page-content");

      let user = auth.getUser();
      if (!user) {
        try { user = await getMe(); auth.setUser(user); } catch (_) {}
      }

      // Check community membership tier
      const memberships = user?.communityMemberships || user?.community_memberships || [];
      const myMembership = memberships.find(m => (m.communitySlug || m.community_slug) === communitySlug);
      const isPlatformAdmin = user?.tier === "admin";
      const isCommunityAdmin = myMembership && (myMembership.tier === "facilitator" || myMembership.tier === "admin");

      if (!isPlatformAdmin && !isCommunityAdmin) {
        content.innerHTML = `<div class="error-message">Access denied. Facilitator or admin role required.</div>`;
        return;
      }

      content.innerHTML = `
        <div style="margin-bottom:16px;">
          <a href="/c/${esc(communitySlug)}" style="font-size:13px; color:#1565c0; text-decoration:none;">← Community Home</a>
        </div>
        <h1 class="page-title">Community Admin</h1>
        <div id="requests-section"><div class="loading">Loading requests…</div></div>
        <div id="members-section" style="margin-top: 48px;"><div class="loading">Loading members…</div></div>
      `;

      loadRequests();
      loadMembers();
    }

    async function loadRequests() {
      const section = document.getElementById("requests-section");
      try {
        const requests = await getFacilitatorRequests(communitySlug);
        renderRequests(section, requests);
      } catch (err) {
        section.innerHTML = `<div class="error-message">Could not load requests: ${esc(err.message)}</div>`;
      }
    }

    function renderRequests(container, requests) {
      const pending = requests.filter(r => r.status === "pending");

      if (pending.length === 0) {
        container.innerHTML = `
          <div class="detail-section">
            <div class="section-heading">Facilitator Requests</div>
            <div class="empty-state" style="padding: 32px 0;">No pending requests.</div>
          </div>`;
        return;
      }

      const rows = pending.map(r => `
        <div class="request-row" id="row-${r.id}">
          <div>
            <div class="request-name">${esc(r.user.display_name)}</div>
            <div class="request-tier">Current tier: ${esc(r.user.tier)}</div>
            <div class="request-reason">${esc(r.reason)}</div>
            <div class="request-date">Submitted ${timeAgo(r.created_at)}</div>
          </div>
          <div class="request-actions">
            <button class="btn-approve" onclick="handleApprove('${esc(r.id)}')">Approve</button>
            <button class="btn-deny"    onclick="handleDeny('${esc(r.id)}')">Deny</button>
          </div>
        </div>
      `).join("");

      container.innerHTML = `
        <div class="detail-section">
          <div class="section-heading">Facilitator Requests — ${pending.length} pending</div>
          ${rows}
        </div>`;
    }

    async function handleApprove(id) {
      const row = document.getElementById(`row-${id}`);
      row.querySelectorAll("button").forEach(b => b.disabled = true);
      try {
        await approveFacilitatorRequest(id);
        row.querySelector(".request-actions").innerHTML =
          `<span class="status-tag status-approved">Approved</span>`;
      } catch (err) {
        row.querySelectorAll("button").forEach(b => b.disabled = false);
        alert(`Error: ${err.message}`);
      }
    }

    async function handleDeny(id) {
      const row = document.getElementById(`row-${id}`);
      row.querySelectorAll("button").forEach(b => b.disabled = true);
      try {
        await denyFacilitatorRequest(id);
        row.querySelector(".request-actions").innerHTML =
          `<span class="status-tag status-denied">Denied</span>`;
      } catch (err) {
        row.querySelectorAll("button").forEach(b => b.disabled = false);
        alert(`Error: ${err.message}`);
      }
    }

    async function loadMembers() {
      const section = document.getElementById("members-section");
      try {
        const members = await getCommunityMembers(communitySlug);
        renderMembers(section, members);
      } catch (err) {
        section.innerHTML = `<div class="error-message">Could not load members: ${esc(err.message)}</div>`;
      }
    }

    function renderMembers(container, members) {
      const rows = members.length === 0
        ? `<div class="empty-state">No members yet.</div>`
        : members.map(m => `
          <div class="member-row">
            <span class="member-name">${esc(m.display_name)}</span>
            <span class="tier-badge ${tierClass(m.tier)}">${esc(m.tier)}</span>
          </div>`).join("");

      container.innerHTML = `
        <div class="detail-section">
          <div class="section-heading">Members (${members.length})</div>
          ${rows}
        </div>`;
    }

    init();
  </script>

</body>
</html>
