<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civic Deliberation Platform</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <span class="site-title">Civic Platform</span>
      <div class="nav-auth" id="nav-auth">
        <a href="/signin">Sign in</a>
      </div>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">Active Discussions</h1>
    <p class="page-subtitle">
      Threads are phase-gated deliberations. Each moves through Open → Deliberating
      → Proposing → Voting → Closed.
    </p>

    <div id="thread-list-container">
      <div class="loading">Loading threads…</div>
    </div>
  </main>

  <!-- Load JS files. Order matters: auth and utils before api, api before page logic. -->
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    // ===== Page Logic =====

    // Update header based on auth state
    async function updateNav() {
      const navEl = document.getElementById("nav-auth");
      if (!auth.isSignedIn()) return;

      let user = auth.getUser();
      if (!user) {
        try {
          user = await getMe();
          auth.setUser(user);
        } catch (_) {}
      }

      navEl.innerHTML = `
        <span>Power to the People, ${user ? user.display_name : "friend"}!</span>
        &nbsp;·&nbsp;
        <a href="#" onclick="handleSignOut()">Sign out</a>
        &nbsp;·&nbsp;
        <a href="/account">Account</a>
      `;
    }

    function handleSignOut() {
      auth.clearToken();
      window.location.reload();
    }

    // Render a single thread card as an HTML string
    function renderThreadCard(thread) {
      const sc = thread.signal_counts;

      return `
        <a href="/thread/${thread.id}" style="display:block">
          <div class="thread-card">
            <div class="thread-card-header">
              <span class="thread-title">${thread.title}</span>
              <span class="${phaseBadgeClass(thread.status)}">
                ${capitalize(thread.status)}
              </span>
            </div>

            <div class="signal-bar">
              ${sc.support > 0 ? `
                <span class="signal-count signal-support">
                  ${SIGNAL_ICONS.support} ${sc.support} support
                </span>` : ""}
              ${sc.concern > 0 ? `
                <span class="signal-count signal-concern">
                  ${SIGNAL_ICONS.concern} ${sc.concern} concern
                </span>` : ""}
              ${sc.need_info > 0 ? `
                <span class="signal-count signal-need_info">
                  ${SIGNAL_ICONS.need_info} ${sc.need_info} need info
                </span>` : ""}
              ${sc.block > 0 ? `
                <span class="signal-count signal-block">
                  ${SIGNAL_ICONS.block} ${sc.block} block
                </span>` : ""}
              ${sc.total === 0 ? `<span>No signals yet</span>` : ""}
            </div>

            <div class="thread-meta">
              ${thread.post_count} post${thread.post_count !== 1 ? "s" : ""}
              · ${thread.proposal_count} proposal${thread.proposal_count !== 1 ? "s" : ""}
              · ${timeAgo(thread.created_at)}
            </div>
          </div>
        </a>
      `;
    }

    // Main load function
    async function loadThreads() {
      const container = document.getElementById("thread-list-container");

      try {
        const threads = await getThreads();

        if (threads.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              No threads yet. A facilitator can create the first one.
            </div>`;
          return;
        }

        container.innerHTML = `
          <div class="thread-list">
            ${threads.map(renderThreadCard).join("")}
          </div>`;

      } catch (err) {
        container.innerHTML = `
          <div class="error-message">
            Could not load threads: ${err.message}
          </div>`;
      }
    }

    // Run on page load
    updateNav();
    loadThreads();
  </script>

</body>
</html>
