<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — Civic Platform</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/nav.js"></script>
  <style>
    .acct-tooltip-btn {
      background: none; border: 1px solid #e5e7eb; border-radius: 4px;
      padding: 0.35rem 0.8rem; font-size: 0.85rem; color: #374151;
      cursor: pointer; transition: border-color 0.15s; font-family: inherit;
    }
    .acct-tooltip-btn:hover { border-color: #9ca3af; }
    .btn-secondary {
      background: none; border: 1px solid #d1d5db; border-radius: 6px;
      padding: 8px 16px; font-size: 14px; color: #374151;
      cursor: pointer; transition: border-color 0.15s; font-family: inherit;
    }
    .btn-secondary:hover { border-color: #6b7280; }
    .btn-danger {
      background: #fee2e2; border: 1px solid #fca5a5; border-radius: 6px;
      padding: 8px 16px; font-size: 14px; color: #b91c1c;
      cursor: pointer; font-family: inherit; font-weight: 500;
      transition: background 0.15s;
    }
    .btn-danger:hover { background: #fecaca; }
    .acct-danger-zone { border: 1px solid #fee2e2; border-radius: 8px; padding: 16px 20px; }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="container" id="account-container">
    <div class="loading">Loading account…</div>
  </main>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>

    function renderFacilitatorSection(user, facReq) {
      const tierOrder = ["registered", "participant", "facilitator", "admin"];
      const isFacilitator = tierOrder.indexOf(user.tier) >= tierOrder.indexOf("facilitator");

      if (isFacilitator) {
        return `
          <div class="detail-section">
            <div class="section-heading">Facilitator Status</div>
            <p class="account-field-desc">
              You have facilitator access. You can advance thread phases and moderate posts.
            </p>
          </div>`;
      }

      // Check if user is already a community facilitator in any community
      const memberships = user.communityMemberships || user.community_memberships || [];
      const alreadyFacilitator = memberships.some(m => m.tier === "facilitator" || m.tier === "admin");
      if (alreadyFacilitator) {
        return `
          <div class="detail-section">
            <div class="section-heading">Facilitator Status</div>
            <p class="account-field-desc">
              You are a facilitator in one or more communities. Visit your community's admin panel to manage discussions.
            </p>
          </div>`;
      }

      if (facReq && facReq.status === "pending") {
        return `
          <div class="detail-section">
            <div class="section-heading">Facilitator Application</div>
            <div class="account-feedback account-feedback-success" style="display:block; margin-bottom:0;">
              Application submitted — we'll review it shortly.
            </div>
          </div>`;
      }

      const deniedNote = (facReq && facReq.status === "denied")
        ? `<p class="account-limit-warning">Your previous application was not approved. You're welcome to apply again.</p>`
        : "";

      // Get the first community ID for the request
      const firstMembership = memberships[0];
      const communitySlugAttr = firstMembership ? ` data-community-slug="${escapeHtml(firstMembership.communitySlug || firstMembership.community_slug || '')}"` : "";

      return `
        <div class="detail-section">
          <div class="section-heading">Apply for Facilitator Status</div>
          <p class="account-field-desc">
            Facilitators can advance thread phases and moderate posts.
            Briefly explain why you'd like facilitator access (1–2 sentences).
          </p>
          ${deniedNote}
          <form id="facilitator-form" onsubmit="handleFacilitatorSubmit(event)"${communitySlugAttr}>
            <div class="form-field">
              <label for="facilitator-reason">Why do you want to facilitate?</label>
              <textarea
                id="facilitator-reason"
                rows="3"
                minlength="10"
                maxlength="500"
                required
                placeholder="Brief explanation…"
                style="width:100%; padding:9px 12px; border:1px solid #d0d0d0; border-radius:6px; font-family:inherit; font-size:14px; resize:vertical; box-sizing:border-box;"
              ></textarea>
            </div>
            <div id="facilitator-feedback" class="account-feedback" style="display:none"></div>
            <button type="submit" class="btn-primary" id="facilitator-submit"
              style="width:auto; padding:8px 20px;">
              Submit application
            </button>
          </form>
        </div>`;
    }

    function renderCommunityMemberships(memberships) {
      if (!memberships || memberships.length === 0) {
        return `
          <div class="detail-section">
            <div class="section-heading">Communities</div>
            <p class="account-field-desc">You haven't joined any communities yet.</p>
          </div>`;
      }

      const TIER_COLORS = {
        admin:       { bg: "#ede7f6", color: "#4527a0" },
        facilitator: { bg: "#e3f2fd", color: "#1565c0" },
        participant: { bg: "#e8f5e9", color: "#2e7d32" },
        registered:  { bg: "#f5f5f5", color: "#555" },
      };

      const cards = memberships.map(m => {
        const slug = m.communitySlug || m.community_slug;
        const name = m.communityName || m.community_name;
        const tier = m.tier;
        const c = TIER_COLORS[tier] || TIER_COLORS.registered;
        return `
          <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f0f0f0;">
            <a href="/c/${escapeHtml(slug)}" style="font-weight:600; font-size:15px; color:#1a1a1a; text-decoration:none;">
              ${escapeHtml(name)}
            </a>
            <span style="font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px; background:${c.bg}; color:${c.color}; text-transform:uppercase; letter-spacing:0.04em;">
              ${escapeHtml(tier)}
            </span>
          </div>`;
      }).join("");

      return `
        <div class="detail-section">
          <div class="section-heading">Communities</div>
          ${cards}
        </div>`;
    }

    function renderAccount(user, facReq) {
      const remaining = user.display_name_changes_remaining;
      const used = user.display_name_changes_this_month;
      const atLimit = remaining === 0;
      const memberships = user.communityMemberships || user.community_memberships || [];

      const limitNote = atLimit
        ? `<p class="account-limit-warning">You've used all 3 display name changes for this 30-day period.</p>`
        : `<p class="account-limit-note">${remaining} change${remaining !== 1 ? "s" : ""} remaining this month (${used}/3 used).</p>`;

      return `
        <h1 class="page-title">Account</h1>

        ${renderFacilitatorSection(user, facReq)}

        ${renderCommunityMemberships(memberships)}

        <div class="detail-section">
          <div class="section-heading">Profile</div>

          <div class="account-field">
            <span class="account-field-label">Email</span>
            <span class="account-field-value">${escapeHtml(user.email)}</span>
          </div>

          <div class="account-field">
            <span class="account-field-label">Member since</span>
            <span class="account-field-value">${new Date(user.created_at).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}</span>
          </div>

          <div class="account-field">
            <span class="account-field-label">Role</span>
            <span class="account-field-value">${capitalize(user.tier)}</span>
          </div>
        </div>

        <div class="detail-section">
          <div class="section-heading">Display Name</div>
          <p class="account-field-desc">
            This is how you appear in discussions. Choose a first name or handle — not a full name.
          </p>

          <form id="display-name-form" onsubmit="handleDisplayNameSubmit(event)">
            <div class="form-field">
              <label for="display-name-input">Display name</label>
              <input
                id="display-name-input"
                type="text"
                value="${escapeHtml(user.display_name)}"
                minlength="2"
                maxlength="60"
                autocomplete="off"
                ${atLimit ? "disabled" : ""}
              >
            </div>
            ${limitNote}
            <div id="display-name-feedback" class="account-feedback" style="display:none"></div>
            <button
              type="submit"
              class="btn-primary account-save-btn"
              id="display-name-submit"
              ${atLimit ? "disabled" : ""}
            >Save display name</button>
          </form>
        </div>

        <div class="detail-section">
          <div class="section-heading">Help Tooltips</div>
          <p class="account-field-desc">
            Contextual tips appear throughout the platform to explain features as you use them.
          </p>
          <button id="acct-tooltip-toggle" class="acct-tooltip-btn" onclick="handleTooltipToggle()">💡 Tips: On</button>
        </div>

        <div class="detail-section">
          <div class="section-heading">Password &amp; Security</div>
          <p class="account-field-desc">
            Send a password reset link to: <strong>${escapeHtml(user.email)}</strong>
          </p>
          <div id="password-reset-feedback" class="account-feedback" style="display:none"></div>
          <button class="btn-secondary" id="password-reset-btn" onclick="handlePasswordReset()">Send reset link</button>
        </div>

        <div class="detail-section">
          <div class="section-heading">Sign Out</div>
          <p class="account-field-desc">Sign out of your account on this device.</p>
          <button class="btn-secondary" onclick="auth.clearToken(); window.location.href='/signin';">Sign out</button>
        </div>

        <div class="detail-section acct-danger-zone">
          <div class="section-heading" style="color:#b91c1c;">Delete Account</div>
          <p class="account-field-desc">
            Permanently deactivates your account. Your posts and contributions remain visible as part of the public record.
          </p>
          <div id="delete-confirm-area" style="display:none; margin-top:12px;">
            <p class="account-field-desc" style="color:#b91c1c; margin-bottom:8px;">Type <strong>DELETE</strong> to confirm.</p>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
              <input id="delete-confirm-input" type="text" placeholder="DELETE"
                style="padding:8px 12px; border:1px solid #fca5a5; border-radius:6px; font-family:inherit; font-size:14px; width:140px;">
              <button class="btn-danger" id="delete-confirm-btn" onclick="handleDeleteConfirm()">Confirm delete</button>
              <button class="btn-secondary" onclick="cancelDelete()" style="font-size:13px;">Cancel</button>
            </div>
            <div id="delete-feedback" class="account-feedback" style="display:none; margin-top:8px;"></div>
          </div>
          <button class="btn-danger" id="delete-start-btn" onclick="startDelete()" style="margin-top:4px;">Delete my account</button>
        </div>

        <div id="engagement-section"></div>
      `;
    }

    function renderEngagement(activity) {
      if (!activity || !activity.communities || activity.communities.length === 0) return;

      const SIG_COLORS = {
        support:   { color: "#4caf50", label: "Support",   icon: "↑" },
        concern:   { color: "#ff9800", label: "Concern",   icon: "↓" },
        need_info: { color: "#2196f3", label: "Need info", icon: "?" },
        block:     { color: "#e53935", label: "Block",     icon: "✕" },
      };

      const TIER_COLORS = {
        admin:       { bg: "#ede7f6", color: "#4527a0" },
        facilitator: { bg: "#e3f2fd", color: "#1565c0" },
        participant: { bg: "#e8f5e9", color: "#2e7d32" },
        registered:  { bg: "#f5f5f5", color: "#555" },
      };

      const cards = activity.communities.map(function(c) {
        const tc = TIER_COLORS[c.membershipTier || c.membership_tier] || TIER_COLORS.registered;
        const tier = c.membershipTier || c.membership_tier;
        const slug = c.communitySlug || c.community_slug;
        const name = c.communityName || c.community_name;
        const joined = new Date(c.joinedAt || c.joined_at).toLocaleDateString("en-US", { year: "numeric", month: "short" });
        const postCount = c.postCount !== undefined ? c.postCount : (c.post_count || 0);
        const commentCount = c.proposalCommentCount !== undefined ? c.proposalCommentCount : (c.proposal_comment_count || 0);
        const sigs = c.signalsReceived || c.signals_received || {};

        const total = Object.values(sigs).reduce(function(a, b) { return a + b; }, 0);

        let barHtml = "";
        if (total > 0) {
          const segments = ["support", "concern", "need_info", "block"].map(function(type) {
            const count = sigs[type] || 0;
            if (count === 0) return "";
            const pct = (count / total * 100).toFixed(1);
            return `<div title="${SIG_COLORS[type].label}" style="width:${pct}%; background:${SIG_COLORS[type].color}; height:100%;"></div>`;
          }).join("");

          const legend = ["support", "concern", "need_info", "block"].map(function(type) {
            return `<span style="display:inline-flex; align-items:center; gap:3px; font-size:11px; color:#666;">
              <span style="display:inline-block; width:8px; height:8px; border-radius:2px; background:${SIG_COLORS[type].color};"></span>
              ${SIG_COLORS[type].icon} ${SIG_COLORS[type].label}
            </span>`;
          }).join("");

          barHtml = `
            <div style="margin-top:12px;">
              <p style="font-size:12px; color:#888; margin:0 0 6px;">How peers react to your content</p>
              <div style="display:flex; height:10px; border-radius:5px; overflow:hidden; background:#f0f0f0;">${segments}</div>
              <div style="display:flex; gap:12px; margin-top:6px; flex-wrap:wrap;">${legend}</div>
            </div>`;
        } else {
          barHtml = `<p style="font-size:12px; color:#aaa; margin-top:10px;">No reactions on your content yet.</p>`;
        }

        return `
          <div style="padding:14px 0; border-bottom:1px solid #f0f0f0;">
            <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
              <a href="/c/${escapeHtml(slug)}" style="font-weight:600; font-size:15px; color:#1a1a1a; text-decoration:none;">${escapeHtml(name)}</a>
              <span style="font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px; background:${tc.bg}; color:${tc.color}; text-transform:uppercase; letter-spacing:0.04em;">${escapeHtml(tier)}</span>
            </div>
            <p style="font-size:13px; color:#666; margin:4px 0 0;">
              ${postCount} post${postCount !== 1 ? "s" : ""} · ${commentCount} comment${commentCount !== 1 ? "s" : ""} · joined ${escapeHtml(joined)}
            </p>
            ${barHtml}
          </div>`;
      }).join("");

      const section = document.getElementById("engagement-section");
      if (section) {
        section.innerHTML = `
          <div class="detail-section">
            <div class="section-heading">Your Engagement</div>
            ${cards}
          </div>`;
      }
    }

    function initTooltipToggleBtn() {
      const btn = document.getElementById("acct-tooltip-toggle");
      if (!btn) return;
      const isDisabled = document.body.classList.contains("tooltips-disabled");
      btn.textContent = isDisabled ? "💡 Tips: Off" : "💡 Tips: On";
    }

    function handleTooltipToggle() {
      const isDisabled = document.body.classList.toggle("tooltips-disabled");
      localStorage.setItem("tooltips-disabled", isDisabled);
      const btn = document.getElementById("acct-tooltip-toggle");
      if (btn) btn.textContent = isDisabled ? "💡 Tips: Off" : "💡 Tips: On";
    }

    async function handlePasswordReset() {
      const btn = document.getElementById("password-reset-btn");
      const fb  = document.getElementById("password-reset-feedback");
      fb.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Sending…";
      try {
        await requestPasswordReset();
        fb.textContent = "Reset link sent — check your email.";
        fb.className = "account-feedback account-feedback-success";
        fb.style.display = "block";
        btn.textContent = "Sent";
      } catch (err) {
        fb.textContent = err.message || "Could not send reset link. Please try again.";
        fb.className = "account-feedback account-feedback-error";
        fb.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Send reset link";
      }
    }

    function startDelete() {
      document.getElementById("delete-start-btn").style.display = "none";
      document.getElementById("delete-confirm-area").style.display = "block";
      document.getElementById("delete-confirm-input").focus();
    }

    function cancelDelete() {
      document.getElementById("delete-start-btn").style.display = "";
      document.getElementById("delete-confirm-area").style.display = "none";
      document.getElementById("delete-confirm-input").value = "";
      document.getElementById("delete-feedback").style.display = "none";
    }

    async function handleDeleteConfirm() {
      const input = document.getElementById("delete-confirm-input");
      const btn   = document.getElementById("delete-confirm-btn");
      const fb    = document.getElementById("delete-feedback");
      fb.style.display = "none";

      if (input.value.trim() !== "DELETE") {
        fb.textContent = "Type DELETE (all caps) to confirm.";
        fb.className = "account-feedback account-feedback-error";
        fb.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Deleting…";
      try {
        await deactivateAccount();
        auth.clearToken();
        window.location.href = "/";
      } catch (err) {
        fb.textContent = err.message || "Could not delete account. Please try again.";
        fb.className = "account-feedback account-feedback-error";
        fb.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Confirm delete";
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function handleFacilitatorSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById("facilitator-submit");
      const feedback = document.getElementById("facilitator-feedback");
      const reason = document.getElementById("facilitator-reason").value.trim();
      const form = document.getElementById("facilitator-form");
      const communitySlug = form ? form.dataset.communitySlug || null : null;

      feedback.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Submitting…";

      // Resolve community UUID from slug if we have one
      let communityId = null;
      if (communitySlug) {
        try {
          const community = await getCommunity(communitySlug);
          communityId = community.id;
        } catch (_) {}
      }

      try {
        await submitFacilitatorRequest(reason, communityId);
        // Replace the form section with a pending confirmation
        btn.closest(".detail-section").innerHTML = `
          <div class="section-heading">Facilitator Application</div>
          <div class="account-feedback account-feedback-success" style="display:block; margin-bottom:0;">
            Application submitted — we'll review it shortly.
          </div>`;
      } catch (err) {
        feedback.textContent = err.message || "Could not submit application. Please try again.";
        feedback.className = "account-feedback account-feedback-error";
        feedback.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Submit application";
      }
    }

    async function handleDisplayNameSubmit(e) {
      e.preventDefault();
      const input = document.getElementById("display-name-input");
      const btn = document.getElementById("display-name-submit");
      const feedback = document.getElementById("display-name-feedback");
      const newName = input.value.trim();

      feedback.style.display = "none";
      feedback.className = "account-feedback";

      if (!newName || newName.length < 2) {
        showFeedback("Display name must be at least 2 characters.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Saving…";

      try {
        const updated = await updateDisplayName(newName);
        auth.setUser(updated);
        // Re-render with fresh data
        document.getElementById("account-container").innerHTML = renderAccount(updated);
        // Show success in freshly rendered feedback
        const newFeedback = document.getElementById("display-name-feedback");
        if (newFeedback) {
          newFeedback.textContent = "Display name updated.";
          newFeedback.className = "account-feedback account-feedback-success";
          newFeedback.style.display = "block";
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Save display name";
        showFeedback(err.message || "Could not save. Please try again.", "error");
      }
    }

    function showFeedback(msg, type) {
      const el = document.getElementById("display-name-feedback");
      if (!el) return;
      el.textContent = msg;
      el.className = `account-feedback account-feedback-${type}`;
      el.style.display = "block";
    }

    async function init() {
      const container = document.getElementById("account-container");

      if (!auth.isSignedIn()) {
        window.location.href = "/signin";
        return;
      }

      try {
        const tierOrder = ["registered", "participant", "facilitator", "admin"];

        // Fetch user data and activity in parallel
        const [user, activity] = await Promise.all([
          getMe(),
          getMyActivity().catch(function() { return null; }),
        ]);
        auth.setUser(user);

        // Fetch facilitator request status for users below facilitator tier
        let facReq = null;
        if (tierOrder.indexOf(user.tier) < tierOrder.indexOf("facilitator")) {
          try { facReq = await getMyFacilitatorRequest(); } catch (_) {}
        }

        container.innerHTML = renderAccount(user, facReq);
        initTooltipToggleBtn();
        if (activity) renderEngagement(activity);
      } catch (err) {
        container.innerHTML = `
          <div class="error-message">Could not load account: ${err.message}</div>
          <p style="margin-top:16px"><a href="/">← Back to discussions</a></p>
        `;
      }
    }

    init();
  </script>

</body>
</html>
