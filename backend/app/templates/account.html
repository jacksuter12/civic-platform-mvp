<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — Civic Platform</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/nav.js"></script>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="container" id="account-container">
    <div class="loading">Loading account…</div>
  </main>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>

    function renderFacilitatorSection(user, facReq) {
      const tierOrder = ["registered", "participant", "facilitator", "admin"];
      const isFacilitator = tierOrder.indexOf(user.tier) >= tierOrder.indexOf("facilitator");

      if (isFacilitator) {
        return `
          <div class="detail-section">
            <div class="section-heading">Facilitator Status</div>
            <p class="account-field-desc">
              You have facilitator access. You can advance thread phases and moderate posts.
            </p>
          </div>`;
      }

      // Check if user is already a community facilitator in any community
      const memberships = user.communityMemberships || user.community_memberships || [];
      const alreadyFacilitator = memberships.some(m => m.tier === "facilitator" || m.tier === "admin");
      if (alreadyFacilitator) {
        return `
          <div class="detail-section">
            <div class="section-heading">Facilitator Status</div>
            <p class="account-field-desc">
              You are a facilitator in one or more communities. Visit your community's admin panel to manage discussions.
            </p>
          </div>`;
      }

      if (facReq && facReq.status === "pending") {
        return `
          <div class="detail-section">
            <div class="section-heading">Facilitator Application</div>
            <div class="account-feedback account-feedback-success" style="display:block; margin-bottom:0;">
              Application submitted — we'll review it shortly.
            </div>
          </div>`;
      }

      const deniedNote = (facReq && facReq.status === "denied")
        ? `<p class="account-limit-warning">Your previous application was not approved. You're welcome to apply again.</p>`
        : "";

      // Get the first community ID for the request
      const firstMembership = memberships[0];
      const communitySlugAttr = firstMembership ? ` data-community-slug="${escapeHtml(firstMembership.communitySlug || firstMembership.community_slug || '')}"` : "";

      return `
        <div class="detail-section">
          <div class="section-heading">Apply for Facilitator Status</div>
          <p class="account-field-desc">
            Facilitators can advance thread phases and moderate posts.
            Briefly explain why you'd like facilitator access (1–2 sentences).
          </p>
          ${deniedNote}
          <form id="facilitator-form" onsubmit="handleFacilitatorSubmit(event)"${communitySlugAttr}>
            <div class="form-field">
              <label for="facilitator-reason">Why do you want to facilitate?</label>
              <textarea
                id="facilitator-reason"
                rows="3"
                minlength="10"
                maxlength="500"
                required
                placeholder="Brief explanation…"
                style="width:100%; padding:9px 12px; border:1px solid #d0d0d0; border-radius:6px; font-family:inherit; font-size:14px; resize:vertical; box-sizing:border-box;"
              ></textarea>
            </div>
            <div id="facilitator-feedback" class="account-feedback" style="display:none"></div>
            <button type="submit" class="btn-primary" id="facilitator-submit"
              style="width:auto; padding:8px 20px;">
              Submit application
            </button>
          </form>
        </div>`;
    }

    function renderCommunityMemberships(memberships) {
      if (!memberships || memberships.length === 0) {
        return `
          <div class="detail-section">
            <div class="section-heading">Communities</div>
            <p class="account-field-desc">You haven't joined any communities yet.</p>
          </div>`;
      }

      const TIER_COLORS = {
        admin:       { bg: "#ede7f6", color: "#4527a0" },
        facilitator: { bg: "#e3f2fd", color: "#1565c0" },
        participant: { bg: "#e8f5e9", color: "#2e7d32" },
        registered:  { bg: "#f5f5f5", color: "#555" },
      };

      const cards = memberships.map(m => {
        const slug = m.communitySlug || m.community_slug;
        const name = m.communityName || m.community_name;
        const tier = m.tier;
        const c = TIER_COLORS[tier] || TIER_COLORS.registered;
        return `
          <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f0f0f0;">
            <a href="/c/${escapeHtml(slug)}" style="font-weight:600; font-size:15px; color:#1a1a1a; text-decoration:none;">
              ${escapeHtml(name)}
            </a>
            <span style="font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px; background:${c.bg}; color:${c.color}; text-transform:uppercase; letter-spacing:0.04em;">
              ${escapeHtml(tier)}
            </span>
          </div>`;
      }).join("");

      return `
        <div class="detail-section">
          <div class="section-heading">Communities</div>
          ${cards}
        </div>`;
    }

    function renderAccount(user, facReq) {
      const remaining = user.display_name_changes_remaining;
      const used = user.display_name_changes_this_month;
      const atLimit = remaining === 0;
      const memberships = user.communityMemberships || user.community_memberships || [];

      const limitNote = atLimit
        ? `<p class="account-limit-warning">You've used all 3 display name changes for this 30-day period.</p>`
        : `<p class="account-limit-note">${remaining} change${remaining !== 1 ? "s" : ""} remaining this month (${used}/3 used).</p>`;

      return `
        <h1 class="page-title">Account</h1>

        ${renderFacilitatorSection(user, facReq)}

        ${renderCommunityMemberships(memberships)}

        <div class="detail-section">
          <div class="section-heading">Profile</div>

          <div class="account-field">
            <span class="account-field-label">Email</span>
            <span class="account-field-value">${escapeHtml(user.email)}</span>
          </div>

          <div class="account-field">
            <span class="account-field-label">Member since</span>
            <span class="account-field-value">${new Date(user.created_at).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}</span>
          </div>

          <div class="account-field">
            <span class="account-field-label">Role</span>
            <span class="account-field-value">${capitalize(user.tier)}</span>
          </div>
        </div>

        <div class="detail-section">
          <div class="section-heading">Display Name</div>
          <p class="account-field-desc">
            This is how you appear in discussions. Choose a first name or handle — not a full name.
          </p>

          <form id="display-name-form" onsubmit="handleDisplayNameSubmit(event)">
            <div class="form-field">
              <label for="display-name-input">Display name</label>
              <input
                id="display-name-input"
                type="text"
                value="${escapeHtml(user.display_name)}"
                minlength="2"
                maxlength="60"
                autocomplete="off"
                ${atLimit ? "disabled" : ""}
              >
            </div>
            ${limitNote}
            <div id="display-name-feedback" class="account-feedback" style="display:none"></div>
            <button
              type="submit"
              class="btn-primary account-save-btn"
              id="display-name-submit"
              ${atLimit ? "disabled" : ""}
            >Save display name</button>
          </form>
        </div>
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function handleFacilitatorSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById("facilitator-submit");
      const feedback = document.getElementById("facilitator-feedback");
      const reason = document.getElementById("facilitator-reason").value.trim();
      const form = document.getElementById("facilitator-form");
      const communitySlug = form ? form.dataset.communitySlug || null : null;

      feedback.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Submitting…";

      // Resolve community UUID from slug if we have one
      let communityId = null;
      if (communitySlug) {
        try {
          const community = await getCommunity(communitySlug);
          communityId = community.id;
        } catch (_) {}
      }

      try {
        await submitFacilitatorRequest(reason, communityId);
        // Replace the form section with a pending confirmation
        btn.closest(".detail-section").innerHTML = `
          <div class="section-heading">Facilitator Application</div>
          <div class="account-feedback account-feedback-success" style="display:block; margin-bottom:0;">
            Application submitted — we'll review it shortly.
          </div>`;
      } catch (err) {
        feedback.textContent = err.message || "Could not submit application. Please try again.";
        feedback.className = "account-feedback account-feedback-error";
        feedback.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Submit application";
      }
    }

    async function handleDisplayNameSubmit(e) {
      e.preventDefault();
      const input = document.getElementById("display-name-input");
      const btn = document.getElementById("display-name-submit");
      const feedback = document.getElementById("display-name-feedback");
      const newName = input.value.trim();

      feedback.style.display = "none";
      feedback.className = "account-feedback";

      if (!newName || newName.length < 2) {
        showFeedback("Display name must be at least 2 characters.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Saving…";

      try {
        const updated = await updateDisplayName(newName);
        auth.setUser(updated);
        // Re-render with fresh data
        document.getElementById("account-container").innerHTML = renderAccount(updated);
        // Show success in freshly rendered feedback
        const newFeedback = document.getElementById("display-name-feedback");
        if (newFeedback) {
          newFeedback.textContent = "Display name updated.";
          newFeedback.className = "account-feedback account-feedback-success";
          newFeedback.style.display = "block";
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Save display name";
        showFeedback(err.message || "Could not save. Please try again.", "error");
      }
    }

    function showFeedback(msg, type) {
      const el = document.getElementById("display-name-feedback");
      if (!el) return;
      el.textContent = msg;
      el.className = `account-feedback account-feedback-${type}`;
      el.style.display = "block";
    }

    async function init() {
      const container = document.getElementById("account-container");

      if (!auth.isSignedIn()) {
        window.location.href = "/signin";
        return;
      }

      try {
        const user = await getMe();
        auth.setUser(user);

        // Fetch facilitator request status for users below facilitator tier
        let facReq = null;
        const tierOrder = ["registered", "participant", "facilitator", "admin"];
        if (tierOrder.indexOf(user.tier) < tierOrder.indexOf("facilitator")) {
          try { facReq = await getMyFacilitatorRequest(); } catch (_) {}
        }

        container.innerHTML = renderAccount(user, facReq);
      } catch (err) {
        container.innerHTML = `
          <div class="error-message">Could not load account: ${err.message}</div>
          <p style="margin-top:16px"><a href="/">← Back to discussions</a></p>
        `;
      }
    }

    init();
  </script>

</body>
</html>
