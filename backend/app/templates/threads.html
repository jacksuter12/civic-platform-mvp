<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discussions — Civic Platform</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/nav.js"></script>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="container">
    <div style="display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:8px;">
      <h1 class="page-title" style="margin-bottom:0;">Active Discussions</h1>
      <a id="create-thread-btn" href="/new-thread"
         style="display:none; padding:7px 16px; background:#1a1a1a; color:#fff; border-radius:6px; font-size:14px; font-weight:500; text-decoration:none; white-space:nowrap;">
        + Start a discussion
      </a>
    </div>
    <p class="page-subtitle">
      Threads are phase-gated deliberations. Each moves through Open → Deliberating
      → Proposing → Voting → Closed.
    </p>

    <div id="thread-list-container">
      <div class="loading">Loading threads…</div>
    </div>
  </main>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    // ===== Page Logic =====

    async function updateNav() {
      if (!auth.isSignedIn()) return;
      let user = auth.getUser();
      if (!user) {
        try {
          user = await getMe();
          auth.setUser(user);
        } catch (_) {}
      }
    }

    function handleSignOut() {
      auth.clearToken();
      window.location.reload();
    }

    const PHASE_TOOLTIPS = {
      open:         "This thread is accepting new participants. Cast a signal to show where you stand.",
      deliberating: "Active discussion phase. Verified participants are posting and responding.",
      proposing:    "Discussion is closed. Participants are submitting formal proposals to vote on.",
      voting:       "Voting is open. One vote per participant. Results are hidden until the phase closes.",
      closed:       "Deliberation complete. Results are public and the audit log is finalized.",
      archived:     "Historical record. Read-only."
    };

    const SIGNAL_TOOLTIPS = {
      support:   "Participants who support the direction of this discussion",
      concern:   "Participants who have concerns that need addressing",
      need_info: "Participants who need more information before forming a view",
      block:     "Participants with a strong objection. Always shown prominently."
    };

    // Render a single thread card as an HTML string
    function renderThreadCard(thread) {
      const sc = thread.signal_counts;
      const phaseTooltip = PHASE_TOOLTIPS[thread.status] || "";

      return `
        <a href="/thread/${thread.id}" style="display:block">
          <div class="thread-card">
            <div class="thread-card-header">
              <span class="thread-title">${thread.title}</span>
              <span class="${phaseBadgeClass(thread.status)}" data-tooltip="${phaseTooltip}">
                ${capitalize(thread.status)}
              </span>
            </div>

            <div class="signal-bar" data-tooltip="Signals show how participants feel about this thread&#39;s direction — not individual posts. Block signals are always surfaced, even as a minority.">
              ${sc.support > 0 ? `
                <span class="signal-count signal-support" data-tooltip="${SIGNAL_TOOLTIPS.support}">
                  ${SIGNAL_ICONS.support} ${sc.support} support
                </span>` : ""}
              ${sc.concern > 0 ? `
                <span class="signal-count signal-concern" data-tooltip="${SIGNAL_TOOLTIPS.concern}">
                  ${SIGNAL_ICONS.concern} ${sc.concern} concern
                </span>` : ""}
              ${sc.need_info > 0 ? `
                <span class="signal-count signal-need_info" data-tooltip="${SIGNAL_TOOLTIPS.need_info}">
                  ${SIGNAL_ICONS.need_info} ${sc.need_info} need info
                </span>` : ""}
              ${sc.block > 0 ? `
                <span class="signal-count signal-block" data-tooltip="${SIGNAL_TOOLTIPS.block}">
                  ${SIGNAL_ICONS.block} ${sc.block} block
                </span>` : ""}
              ${sc.total === 0 ? `<span>No signals yet</span>` : ""}
            </div>

            <div class="thread-meta">
              ${thread.post_count} post${thread.post_count !== 1 ? "s" : ""}
              · ${thread.proposal_count} proposal${thread.proposal_count !== 1 ? "s" : ""}
              · ${timeAgo(thread.created_at)}
            </div>
          </div>
        </a>
      `;
    }

    // Main load function
    async function loadThreads() {
      const container = document.getElementById("thread-list-container");

      try {
        const threads = await getThreads();

        if (threads.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              No threads yet. A facilitator can create the first one.
            </div>`;
          return;
        }

        container.innerHTML = `
          <div class="thread-list">
            ${threads.map(renderThreadCard).join("")}
          </div>`;

      } catch (err) {
        container.innerHTML = `
          <div class="error-message">
            Could not load threads: ${err.message}
          </div>`;
      }
    }

    // Show create button for signed-in users
    if (auth.isSignedIn()) {
      document.getElementById("create-thread-btn").style.display = "inline-block";
    }

    // Run on page load
    updateNav();
    loadThreads();
  </script>

</body>
</html>
