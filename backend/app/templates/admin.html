<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Civic Platform</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/nav.js"></script>
  <style>
    .request-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 18px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .request-row:last-child { border-bottom: none; }
    .request-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .request-email { font-size: 13px; color: #888; margin-top: 2px; }
    .request-tier {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-top: 4px;
    }
    .request-reason {
      font-size: 14px;
      color: #333;
      margin-top: 10px;
      line-height: 1.5;
      padding-left: 12px;
      border-left: 3px solid #e0e0e0;
    }
    .request-date { font-size: 12px; color: #aaa; margin-top: 6px; }
    .request-actions { display: flex; gap: 8px; flex-shrink: 0; padding-top: 2px; }
    .btn-approve {
      padding: 7px 16px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-approve:hover:not(:disabled) { background: #1b5e20; }
    .btn-deny {
      padding: 7px 16px;
      background: #fff;
      color: #c62828;
      border: 1px solid #e57373;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-deny:hover:not(:disabled) { background: #fff3f3; }
    .btn-approve:disabled, .btn-deny:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-approved { background: #e8f5e9; color: #2e7d32; }
    .status-denied   { background: #fff3f3; color: #c62828; }

    /* Annotator management */
    .user-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .user-row:last-child { border-bottom: none; }
    .user-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .user-email { font-size: 13px; color: #888; margin-top: 2px; }
    .user-meta { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
    .tier-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }
    .annotator-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .annotator-yes    { background: #e3f2fd; color: #1565c0; }
    .annotator-admin  { background: #ede7f6; color: #4527a0; }
    .annotator-no     { background: #f5f5f5; color: #aaa; }
    .btn-grant {
      padding: 6px 14px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-grant:hover:not(:disabled) { background: #0d47a1; }
    .btn-revoke {
      padding: 6px 14px;
      background: #fff;
      color: #c62828;
      border: 1px solid #e57373;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-revoke:hover:not(:disabled) { background: #fff3f3; }
    .btn-grant:disabled, .btn-revoke:disabled { opacity: 0.5; cursor: not-allowed; }
    .confirm-panel {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 8px;
      font-size: 13px;
    }
    .confirm-panel p { margin: 0 0 8px; color: #333; }
    .confirm-panel input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 13px;
      font-family: inherit;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    .confirm-panel .btn-row { display: flex; gap: 8px; }
    .btn-confirm-grant {
      padding: 5px 12px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-confirm-revoke {
      padding: 5px 12px;
      background: #c62828;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-cancel-confirm {
      padding: 5px 12px;
      background: #fff;
      color: #555;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .inline-error { font-size: 12px; color: #c62828; margin-top: 4px; }
    .search-box {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      box-sizing: border-box;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="container" style="padding-top: 32px; padding-bottom: 64px;">
    <div id="page-content">
      <div class="loading">Loading…</div>
    </div>
  </main>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script>

    async function init() {
      if (!auth.isSignedIn()) {
        window.location.href = "/signin";
        return;
      }

      const content = document.getElementById("page-content");

      let user = auth.getUser();
      if (!user) {
        try { user = await getMe(); auth.setUser(user); } catch (_) {}
      }

      // Platform admin only (tier === 'admin' is the proxy for platform_role === 'platform_admin')
      if (!user || user.tier !== "admin") {
        content.innerHTML = `<div class="error-message">Access denied. Platform admin only.</div>`;
        return;
      }

      content.innerHTML = `
        <h1 class="page-title">Platform Admin</h1>
        <div id="community-section" style="margin-bottom: 48px;"><div class="loading">Loading communities…</div></div>
        <div id="annotator-section" style="margin-top: 48px;"><div class="loading">Loading users…</div></div>
      `;

      loadCommunitySection();
      loadAnnotatorSection();
    }

    // -----------------------------------------------------------------------
    // Community management
    // -----------------------------------------------------------------------

    async function loadCommunitySection() {
      const section = document.getElementById("community-section");
      try {
        const communities = await listCommunities();
        renderCommunitySection(section, communities);
      } catch (err) {
        section.innerHTML = `<div class="error-message">Could not load communities: ${escapeHtml(err.message)}</div>`;
      }
    }

    function renderCommunitySection(container, communities) {
      const rows = communities.length === 0
        ? `<div class="empty-state" style="padding: 16px 0;">No communities yet.</div>`
        : communities.map(c => `
          <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f0f0f0;">
            <div>
              <a href="/c/${escapeHtml(c.slug)}" style="font-weight:600; font-size:15px; color:#1a1a1a;">${escapeHtml(c.name)}</a>
              <div style="font-size:12px; color:#888; margin-top:2px;">${escapeHtml(c.slug)} · ${c.member_count} members · ${c.active_thread_count} active threads</div>
            </div>
            <a href="/c/${escapeHtml(c.slug)}/admin" style="font-size:13px; color:#1565c0; text-decoration:none;">Manage →</a>
          </div>`).join("");

      container.innerHTML = `
        <div class="detail-section">
          <div class="section-heading">Communities</div>
          ${rows}
          <div style="margin-top: 24px;">
            <button class="btn-grant" onclick="showCreateCommunityForm()" id="show-create-btn">+ New Community</button>
          </div>
          <div id="create-community-form" style="display:none; margin-top:16px;"></div>
          <div class="inline-error" id="create-community-error"></div>
        </div>
      `;
    }

    function showCreateCommunityForm() {
      document.getElementById("show-create-btn").style.display = "none";
      document.getElementById("create-community-form").style.display = "block";
      document.getElementById("create-community-form").innerHTML = `
        <div style="background:#f9f9f9; border:1px solid #e0e0e0; border-radius:8px; padding:16px;">
          <div style="font-weight:600; font-size:14px; margin-bottom:12px;">Create Community</div>
          <div style="display:grid; gap:10px;">
            <div>
              <label style="font-size:13px; font-weight:600; display:block; margin-bottom:3px;">Slug</label>
              <input id="c-slug" type="text" placeholder="e.g. redlands" style="width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:5px; font-size:13px; box-sizing:border-box;">
            </div>
            <div>
              <label style="font-size:13px; font-weight:600; display:block; margin-bottom:3px;">Name</label>
              <input id="c-name" type="text" placeholder="e.g. Redlands Healthcare Consortium" style="width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:5px; font-size:13px; box-sizing:border-box;">
            </div>
            <div>
              <label style="font-size:13px; font-weight:600; display:block; margin-bottom:3px;">Description</label>
              <textarea id="c-description" rows="2" style="width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:5px; font-size:13px; box-sizing:border-box; resize:vertical;"></textarea>
            </div>
            <div>
              <label style="font-size:13px; font-weight:600; display:block; margin-bottom:3px;">Type</label>
              <select id="c-type" style="width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:5px; font-size:13px;">
                <option value="geographic">Geographic</option>
                <option value="organizational">Organizational</option>
                <option value="institutional">Institutional</option>
                <option value="topical">Topical</option>
                <option value="technical">Technical</option>
              </select>
            </div>
            <div>
              <label style="font-size:13px; font-weight:600; display:block; margin-bottom:3px;">Boundary description</label>
              <input id="c-boundary" type="text" placeholder="e.g. Residents of Redlands, CA" style="width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:5px; font-size:13px; box-sizing:border-box;">
            </div>
            <div>
              <label style="font-size:13px; font-weight:600; display:block; margin-bottom:3px;">Verification method</label>
              <input id="c-verification" type="text" placeholder="e.g. Self-attestation" style="width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:5px; font-size:13px; box-sizing:border-box;">
            </div>
            <div style="display:flex; gap:8px;">
              <label style="font-size:13px; display:flex; align-items:center; gap:6px; cursor:pointer;">
                <input type="checkbox" id="c-public" checked> Public
              </label>
              <label style="font-size:13px; display:flex; align-items:center; gap:6px; cursor:pointer;">
                <input type="checkbox" id="c-invite-only"> Invite only
              </label>
            </div>
          </div>
          <div style="margin-top:12px; display:flex; gap:8px; align-items:center;">
            <button class="btn-confirm-grant" onclick="doCreateCommunity()" id="confirm-create-btn">Create</button>
            <button class="btn-cancel-confirm" onclick="cancelCreateCommunity()">Cancel</button>
          </div>
        </div>
      `;
    }

    function cancelCreateCommunity() {
      document.getElementById("create-community-form").style.display = "none";
      document.getElementById("create-community-form").innerHTML = "";
      document.getElementById("show-create-btn").style.display = "";
      document.getElementById("create-community-error").textContent = "";
    }

    async function doCreateCommunity() {
      const btn = document.getElementById("confirm-create-btn");
      const errEl = document.getElementById("create-community-error");
      errEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Creating…";

      const data = {
        slug:                document.getElementById("c-slug").value.trim(),
        name:                document.getElementById("c-name").value.trim(),
        description:         document.getElementById("c-description").value.trim(),
        community_type:      document.getElementById("c-type").value,
        boundary_desc:       document.getElementById("c-boundary").value.trim(),
        verification_method: document.getElementById("c-verification").value.trim(),
        is_public:           document.getElementById("c-public").checked,
        is_invite_only:      document.getElementById("c-invite-only").checked,
      };

      try {
        await createCommunity(data);
        // Reload the section
        cancelCreateCommunity();
        loadCommunitySection();
      } catch (err) {
        errEl.textContent = `Error: ${err.message}`;
        btn.disabled = false;
        btn.textContent = "Create";
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // -----------------------------------------------------------------------
    // Annotator Management
    // -----------------------------------------------------------------------

    let allUsers = [];

    async function loadAnnotatorSection() {
      const section = document.getElementById("annotator-section");
      try {
        allUsers = await listUsers();
        renderAnnotatorSection(section, allUsers);
      } catch (err) {
        section.innerHTML = `<div class="error-message">Could not load users: ${escapeHtml(err.message)}</div>`;
      }
    }

    function renderAnnotatorSection(container, users) {
      container.innerHTML = `
        <div class="detail-section">
          <div class="section-heading">Annotator Management</div>
          <input
            class="search-box"
            type="text"
            placeholder="Search by name or email…"
            id="user-search"
            oninput="filterUsers()"
          >
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#666;margin-bottom:14px;cursor:pointer;">
            <input type="checkbox" id="hide-seed" checked onchange="filterUsers()">
            Hide seed accounts (@civic.local)
          </label>
          <div id="user-list">${renderUserRows(users.filter(u => !isSeedAccount(u)))}</div>
        </div>
      `;
    }

    function isSeedAccount(u) {
      return u.email.endsWith("@civic.local");
    }

    function renderUserRows(users) {
      if (users.length === 0) {
        return `<div class="empty-state" style="padding: 24px 0;">No users found.</div>`;
      }
      return users.map(u => renderUserRow(u)).join("");
    }

    function renderUserRow(u) {
      const isAdmin = u.tier === "admin";
      let badge, actionBtn;

      if (isAdmin) {
        badge = `<span class="annotator-badge annotator-admin">Annotator (admin)</span>`;
        actionBtn = ``;  // non-revocable for admin tier
      } else if (u.is_annotator) {
        badge = `<span class="annotator-badge annotator-yes">Annotator</span>`;
        actionBtn = `<button class="btn-revoke" onclick="showConfirm('${u.id}', 'revoke')">Revoke</button>`;
      } else {
        badge = `<span class="annotator-badge annotator-no">No access</span>`;
        actionBtn = `<button class="btn-grant" onclick="showConfirm('${u.id}', 'grant')">Grant</button>`;
      }

      return `
        <div class="user-row" id="urow-${u.id}">
          <div>
            <div class="user-name">${escapeHtml(u.display_name)}</div>
            <div class="user-email">${escapeHtml(u.email)}</div>
            <div class="user-meta">
              <span class="tier-tag">${escapeHtml(u.tier)}</span>
              ${badge}
            </div>
            <div id="confirm-${u.id}"></div>
            <div class="inline-error" id="err-${u.id}"></div>
          </div>
          <div id="action-${u.id}">${actionBtn}</div>
        </div>
      `;
    }

    function filterUsers() {
      const q = document.getElementById("user-search").value.toLowerCase();
      const hideSeed = document.getElementById("hide-seed").checked;
      let filtered = hideSeed ? allUsers.filter(u => !isSeedAccount(u)) : allUsers;
      if (q) {
        filtered = filtered.filter(u =>
          u.display_name.toLowerCase().includes(q) ||
          u.email.toLowerCase().includes(q)
        );
      }
      document.getElementById("user-list").innerHTML = renderUserRows(filtered);
    }

    function showConfirm(userId, action) {
      const user = allUsers.find(u => u.id === userId);
      if (!user) return;
      const label = action === "grant" ? "Grant" : "Revoke";
      const btnClass = action === "grant" ? "btn-confirm-grant" : "btn-confirm-revoke";
      const verb = action === "grant"
        ? `Grant annotator capability to <strong>${escapeHtml(user.display_name)}</strong>?`
        : `Revoke annotator capability from <strong>${escapeHtml(user.display_name)}</strong>?`;

      document.getElementById(`confirm-${userId}`).innerHTML = `
        <div class="confirm-panel">
          <p>${verb}</p>
          <input type="text" id="reason-${userId}" placeholder="Reason (optional)">
          <div class="btn-row">
            <button class="${btnClass}" onclick="doAnnotatorAction('${userId}', '${action}')">
              ${label}
            </button>
            <button class="btn-cancel-confirm" onclick="cancelConfirm('${userId}')">Cancel</button>
          </div>
        </div>
      `;
      // Hide the action button while confirm panel is open
      document.getElementById(`action-${userId}`).style.display = "none";
    }

    function cancelConfirm(userId) {
      document.getElementById(`confirm-${userId}`).innerHTML = "";
      document.getElementById(`err-${userId}`).textContent = "";
      document.getElementById(`action-${userId}`).style.display = "";
    }

    async function doAnnotatorAction(userId, action) {
      const reasonInput = document.getElementById(`reason-${userId}`);
      const reason = reasonInput ? reasonInput.value.trim() || null : null;
      const errEl = document.getElementById(`err-${userId}`);
      errEl.textContent = "";

      // Disable confirm buttons
      const confirmPanel = document.getElementById(`confirm-${userId}`);
      confirmPanel.querySelectorAll("button").forEach(b => b.disabled = true);

      try {
        if (action === "grant") {
          await grantAnnotator(userId, reason);
        } else {
          await revokeAnnotator(userId, reason);
        }
        // Update local data and re-render the row
        const user = allUsers.find(u => u.id === userId);
        if (user) user.is_annotator = action === "grant";
        const row = document.getElementById(`urow-${userId}`);
        if (row && user) {
          row.outerHTML = renderUserRow(user);
        }
      } catch (err) {
        confirmPanel.querySelectorAll("button").forEach(b => b.disabled = false);
        errEl.textContent = `Error: ${err.message}`;
        document.getElementById(`action-${userId}`).style.display = "";
      }
    }

    init();
  </script>

</body>
</html>
